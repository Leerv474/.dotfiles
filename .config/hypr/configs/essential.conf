################
### MONITORS ###
################

monitor=eDP-1,1920x1080@75,auto,1.2
# monitor=DP-1,1920x1080@75,auto,1,mirror,eDP-1
monitor=DP-1,1920x1080@75,auto,1
monitor=DP-2,2560x1440@75,auto,1.25
# monitor=HDMI-A-1,1920x1080@30,auto,1
monitor=HDMI-A-1,3840x2160@60,auto,1,mirror,eDP-1

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$menu = rofi -show drun
$browser = firefox
$messenger = Telegram

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = waybar 
exec-once = dunst
exec-once = hypridle
exec-once = handle_monitor_connect.sh
exec-once = hyprctl setcursor Bibata-Modern-Ice 18

# screen share
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,Bibata-Modern-Ice 16
env = HYPRCURSOR_SIZE,16
env = XCURSOR_SIZE,16
env = GDK_BACKEND=wayland,x11
env = QT_AUTO_SCREEN_SCALE_FACTOR,1 
env = QT_QPA_PLATFORM=wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION=1
env = WLR_NO_HARDWARE_CURSORS,1
env = QT_QPA_PLATFORMTHEME,gtk3
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


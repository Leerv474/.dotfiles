source = ./configs/essential.conf
source = ./configs/look.conf
source = ./configs/keybinds.conf
#############
### INPUT ###
#############

input {
    kb_layout = us, ru
    # kb_options = grp:alt_shift_toggle, altwin:swap_lalt_lwin
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = "flat"
    scroll_factor = 1

    touchpad {
        natural_scroll = true
        scroll_factor = 0.45
        disable_while_typing = true
        clickfinger_behavior = true # one finger = left click, two fingers = right click
        tap-to-click = true
        drag_lock = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


